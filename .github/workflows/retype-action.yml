# Publishes the Retype documentation site with GitHub Pages.
name: Publish Retype documentation to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/retype-action.yml"
      - "docs/documentation/**"

permissions:
  contents: read

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Retype documentation
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: docs/documentation/package-lock.json

      - name: Install documentation dependencies
        working-directory: docs/documentation
        run: npm ci

      - name: Build documentation
        working-directory: docs/documentation
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/documentation/.retype

  deploy:
    name: Deploy Retype documentation
    runs-on: ubuntu-latest
    needs: build

    permissions:
      pages: write
      id-token: write
      actions: read

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages artifact
        id: deployment
        uses: actions/deploy-pages@v5
